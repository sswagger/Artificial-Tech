<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="stylesheet" href="css/reset.css" />
		<link rel="stylesheet" href="css/basic.css" />
		<link rel="stylesheet" href="css/product.css" />
		<link rel="stylesheet" href="css/form.css" />
		<script src="https://kit.fontawesome.com/6b52a09151.js" crossorigin="anonymous"></script>
		<script src="js/basic.js" defer></script>
		<script src="js/blog.js" defer></script>
		<title>Blog | Artificial Technologies</title>
	</head>

	<body>
		<header id="header"></header>

		<div class="main-content">
			<h2>Open Circuits: Blog Subscription!</h2>
			<h3>Header</h3>
			<form>
				<ul class="template">
					<li><input type="radio" id="temp1" name="template" checked /><label for="temp1"> Template 1</label></li>
					<li><input type="radio" id="temp2" name="template" /><label for="temp2"> Template 2</label></li>
				</ul>
				<div>
					<h3>Color</h3>
					<section>
						<label for="txtColor">Text Color: </label>
						<input type="color" id="txtColor" />
					</section>
					<section>
						<label for="backColor">Background Color: </label>
						<input type="color" id="backColor" />
					</section>
					<section>
						<label for="primaryColor">Primary Color: </label>
						<input type="color" id="primaryColor" />
					</section>
					<section>
						<label for="secondaryColor">Secondary Color: </label>
						<input type="color" id="secondaryColor" />
					</section>
					<section>
						<label for="btnColor">Button Color: </label>
						<input type="color" id="btnColor" />
					</section>
				</div>
				<div>
					<h3>Text</h3>
					<section>
						<label for="title">Title: </label>
						<input type="text" id="title" maxlength="30" />
					</section>
					<section>
						<label for="subtitle">Subtitle: </label>
						<input type="text" id="subtitle" maxlength="30" />
					</section>
					<section>
						<label for="desc">Description: </label>
						<input type="text" id="desc" maxlength="30" />
					</section>
				</div>
				<div>
					<h3>Hot Links (Id of section)</h3>
					<section>
						<label for="link1">Link 1: </label>
						<input type="text" id="link1" maxlength="30" placeholder="ex: #1" />
					</section>
					<section>
						<label for="link1btn">Link 1 Text: </label>
						<input type="text" id="link1btn" maxlength="30" placeholder="ex: First Link!" />
					</section>
					<section>
						<label for="link2">Link 2: </label>
						<input type="text" id="link2" maxlength="30" />
					</section>
					<section>
						<label for="link2btn">Link 2 Text: </label>
						<input type="text" id="link2btn" maxlength="30" />
					</section>
					<section>
						<label for="link3">Link 3: </label>
						<input type="text" id="link3" maxlength="30" />
					</section>
					<section>
						<label for="link3btn">Link 3 Text: </label>
						<input type="text" id="link3btn" maxlength="30" />
					</section>
				</div>
			</form>

			<h3>Body</h3>
			<form>
				<ul class="template" id="sectionSelector"></ul>
				<ul class="template">
					<li><a href="#" id="newSection" onclick="return false;"><i class="fa-solid fa-plus"></i> New Section</a></li>
					<li><a href="#" id="newBtn" onclick="return false;"><i class="fa-solid fa-plus"></i> New Button</a></li>
					<li><a href="#" id="newText" onclick="return false;"><i class="fa-solid fa-plus"></i> New Text</a></li>
					<li><a href="#" id="delete" onclick="return false;"><i class="fa-solid fa-x"></i> Delete Section</a></li>
				</ul>
				<div id="webBody"></div>
			</form>

			<h3>Footer</h3>
			<form>
				<ul class="template">
					<li><input type="radio" id="temp1Footer" name="templateFoot" checked /><label for="temp1Footer"> Template 1</label></li>
					<li><input type="radio" id="temp2Footer" name="templateFoot" /><label for="temp2Footer"> Template 2</label></li>
				</ul>
				<div>
					<h3>Color</h3>
					<section>
						<label for="txtColorFooter">Text Color: </label>
						<input type="color" id="txtColorFooter" />
					</section>
					<section>
						<label for="backColorFooter">Background Color: </label>
						<input type="color" id="backColorFooter" />
					</section>
					<section>
						<label for="btnColorFooter">Button Color: </label>
						<input type="color" id="btnColorFooter" />
					</section>
				</div>
				<div>
					<h3>Hot Links (index of section)</h3>
					<section>
						<label for="link1Footer">Link 1: </label>
						<input type="text" id="link1Footer" maxlength="30" placeholder="ex: #1" />
					</section>
					<section>
						<label for="link1btnFooter">Link 1 Text: </label>
						<input type="text" id="link1btnFooter" maxlength="30" placeholder="ex: First Link!" />
					</section>
					<section>
						<label for="link2Footer">Link 2: </label>
						<input type="text" id="link2Footer" maxlength="30" />
					</section>
					<section>
						<label for="link2btnFooter">Link 2 Text: </label>
						<input type="text" id="link2btnFooter" maxlength="30" />
					</section>
					<section>
						<label for="link3Footer">Link 3: </label>
						<input type="text" id="link3Footer" maxlength="30" />
					</section>
					<section>
						<label for="link3btnFooter">Link 3 Text: </label>
						<input type="text" id="link3btnFooter" maxlength="30" />
					</section>
				</div>
				<div>
					<h3>Logo</h3>
					<section>
						<label for="iconFooter">Logo Image: </label>
						<input type="text" id="iconFooter" maxlength="50" placeholder="ex: %USERPROFILE%/Pictures/myimg.jpg" />
					</section>
					<section>
						<label for="logoFooter">Company: </label>
						<input type="text" id="logoFooter" maxlength="30" />
					</section>
					<section>
						<label for="rightsFooter">Rights Statement: </label>
						<input type="text" id="rightsFooter" maxlength="30" />
					</section>
				</div>
			</form>

			<div class="codeWindow" contenteditable="true" id="userCode"></div>
			<button id="view">View Webpage</button>
			<button id="clear" type="button">Clear all data</button>
		</div>

		<footer id="footer"></footer>
	</body>
</html>
