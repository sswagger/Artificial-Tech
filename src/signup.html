<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="stylesheet" href="css/reset.css" />
		<link rel="stylesheet" href="css/basic.css" />
		<link rel="stylesheet" href="css/form.css" />
		<script src="https://kit.fontawesome.com/6b52a09151.js" crossorigin="anonymous"></script>
		<script src="js/basic.js" defer></script>
		<title>Sign Up | Artificial Technologies</title>
	</head>

	<body>
		<header id="header">
		</header>

		<div class="main-content">
			<img src="img/head-artificial-tech.png" alt="" />
			<h2>Signup Page</h2>

			<form id="form">
				<div>
					<label for="username">Username:</label>
					<input id="username" type="text" minlength="3" maxlength="20" required />
					<label for="pass">Password:</label>
					<input id="pass" type="text" minlength="3" maxlength="20" required />
				</div>

				<div>
					<button type="submit" id="submit">Login</button>
				</div>
			</form>

			<img src="img/footer.png" alt="" class="bottom_img" />
		</div>

		<footer id="footer">
		</footer>
	</body>
</html>
